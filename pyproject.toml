[build-system]
requires = ["setuptools>=77.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "lexnlp"
version = "2.3.0"
description = "LexPredict LexNLP"
readme = { file = "README.rst", content-type = "text/x-rst" }
requires-python = ">=3.10,<3.13"
license = "AGPL-3.0-or-later"
authors = [
  { name = "ContraxSuite, LLC", email = "support@contraxsuite.com" }
]
keywords = [
  "legal",
  "contract",
  "document analytics",
  "nlp",
  "ml",
  "machine learning",
  "natural language"
]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Information Technology",
  "Intended Audience :: Legal Industry",
  "Intended Audience :: Developers",
  "Natural Language :: English",
  "Topic :: Office/Business",
  "Topic :: Text Processing :: Linguistic",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12"
]
dependencies = [
  "beautifulsoup4>=4.11.1,<5",
  "cloudpickle>=2.2.0,<4",
  "dateparser==1.1.3",
  "elasticsearch>=8.5.0,<9",
  "gensim>=4.3.2,<5",
  "joblib>=1.2.0,<2",
  "lxml>=4.9.1,<6",
  "nltk>=3.8.1,<3.9",
  "num2words>=0.5.12,<1",
  "numpy>=1.24.0,<2",
  "pandas>=2.2.0,<3",
  "psutil>=5.9.4,<7",
  "pycountry>=22.3.5,<25",
  "python-dateutil>=2.8.2,<3",
  "regex==2022.3.2",
  "reporters-db>=3.2.32,<4",
  "requests>=2.28.1,<3",
  "scikit-learn>=1.2.2,<1.3",
  "scipy>=1.11.0,<2",
  "tqdm>=4.64.1,<5",
  "Unidecode>=1.3.6,<2",
  "us>=2.0.2,<3",
  "zahlwort2num>=0.4.2,<1"
]

[project.optional-dependencies]
dev = [
  "build>=1.2.2",
  "memory-profiler>=0.61.0",
  "pylint>=3.3.0",
  "pytest>=8.3.0",
  "pytest-cov>=5.0.0",
  "pytest-xdist>=3.6.0",
  "sphinx>=7.4.0",
  "twine>=5.1.1"
]
test = [
  "pytest>=8.3.0",
  "pytest-cov>=5.0.0",
  "pytest-xdist>=3.6.0"
]
stanford = []
tika = ["tika>=2.6.0"]

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
exclude = ["*tests*"]

[tool.ruff]
line-length = 120
target-version = "py310"

[tool.pytest.ini_options]
markers = [
  "serial: sequential-only tests"
]
